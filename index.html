<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans&family=Poiret+One&display=swap" rel="stylesheet">

    <script src="https://kit.fontawesome.com/dea98f1693.js" crossorigin="anonymous"></script>

    <script src="macy.js"></script>

    <link href="styles.css" rel="stylesheet">
    <script src="script.js" defer></script>

    <title>Itsuki Hirano - Portfolio</title>
</head>
<body>
    <div id="container">
        <header>
            <h1>Itsuki Hirano</h1>

            <div id="menuMobile">
                <i class="fa-solid fa-bars"></i>
            </div>

            <div id="menuDesk">
                <ul>
                    <li>Home</li>
                    <li>DAiCon</li>
                    <li>Pangaea</li>
                    <li>Other Works</li>
                </ul>
            </div>
        </header>

        <main>
            <section id="intro">
                <h2>Hi, I'm Itsuki!</h2>
                <p>I am a designer and UC Davis graduate</p>

                <div id="feature">
                    <div id="left" class="cntrl"><i class="fa-solid fa-angle-left"></i></div>

                    
                    <img src="images/collage-daicon.jpg" alt="thumbnail image" width="800" height="500">

                    <div id="title">
                        <p>Davis Anime Convention</p>
                    </div>
                    
                    <div id="right" class="cntrl"><i class="fa-solid fa-angle-right"></i></div>
                </div>
            </section>
            
            <section id="major">
                <article id="daicon">
                    <h3>Davis Anime Convention</h3>

                    <div class="images">
                        <img src="images/daicon-flyer.jpg" alt="daicon flyer">
                        <img src="images/daicon-pamph26.jpg" alt="daicon pamphlet">
                        <img src="images/daicon-badge.jpg" alt="daicon badge design">
                        <img src="daicon/images/vgo.jpg" alt="daicon graphic">
                    </div>

                    <div class="btn">
                        <p><a>See Full Works</a></p>
                    </div>
                </article>

                <article id="pangaea">
                    <h3>Pangaea - Interactive Design Capstone</h3>
                </article>
            </section>

            <section id="other">
                <div id="selector">
                    <div id="web">
                        <p>UI/UX & Interactive Design</p>
                    </div>

                    <div id="graphic">
                        <p>Graphic Design</p>
                    </div>
                </div>

                <article id="webWorks" class="gallery">                    
                    <img src="images/gameOn.jpg" alt="Star Fighter" class="item" id="star">
                    
                    <img src="images/dacinator1.jpg" alt="DAC-inator" class="item" id="dacinator">
                    
                    <img src="images/selfcheck.jpg" alt="Check Self" class="item" id="selfcheck">

                    <img src="images/wordwall.jpg" alt="Global Word Wall" class="item" id="wordwall">

                    <img src="images/des112.jpg" alt="Neighbor Shop" class="item" id="des112">
                </article>

                <article id="graphicWorks" class="gallery">
                    <img src="images/kon.jpg" alt="Kon Chips" class="item" id="kon">

                    <img src="images/poster.jpg" alt="Event Poster" class="item" id="poster">

                    <img src="images/book.jpg" alt="Typographic Book" class="item" id="book">

                    <img src="images/type-poster.jpg" alt="Typographic Poster" class="item" id="type">
                </article>
            </section>
        </main>
    </div>   
</body>
</html>
